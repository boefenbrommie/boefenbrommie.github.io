<script>

/* formulier verzenden */

document.getElementById('bestelForm')
.addEventListener('submit',function(e){

e.preventDefault();

fetch(this.action,{
method:this.method,
body:new FormData(this),
headers:{'Accept':'application/json'}
})
.then(()=>window.location.href='bedankt.html')
.catch(()=>alert('Er ging iets mis'));

});

/* actieve pagina */

(function(){

const path=
window.location.pathname.split('/').pop()
||'index.html';

document
.querySelectorAll('#navLinks a')
.forEach(a=>{

if(
a.getAttribute('href')
===path
){
a.classList.add('active');
}

});

})();
