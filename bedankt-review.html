<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Bedankt voor je review!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lobster+Two&display=swap" rel="stylesheet">

  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f7f7f7; color:#333; }
    .container { max-width:900px; margin:0 auto; padding:60px 20px; background:#fff; text-align:center; }

    h1 { font-family:'Anton', sans-serif; color:#0179F1; font-size:2.6em; margin:0 0 14px; }
    p { font-size:1.1em; line-height:1.6; margin:0 0 25px; }

    .box {
      background:#C9E4FF;
      border:2px solid #0179F1;
      border-radius:16px;
      padding:28px 22px;
      max-width:720px;
      margin:0 auto;
    }

    a {
      display:inline-block;
      margin-top:22px;
      padding:12px 26px;
      background:#0179F1;
      color:#fff;
      text-decoration:none;
      border-radius:12px;
      font-family:'Lobster Two', cursive;
      font-size:1.25em;
    }
    a:hover { background:#015ec7; }

    footer { margin-top:45px; font-size:0.9em; color:#666; }
  </style>
</head>

<body>
  <div class="container">
    <h1>Bedankt!</h1>

    <div class="box">
      <p>Superleuk dat je een review hebt achtergelaten! 🎉</p>
      <p>Alle reviews worden gelezen. Een selectie verschijnt op de website.</p>

      <a href="index.html">Terug naar de startpagina</a>
    </div>

    <footer>
      <p>© Boef & Brommie – bestelboefenbrommie.nl – koopboefenbrommie.nl</p>
    </footer>
  </div>
</body>
</html>
